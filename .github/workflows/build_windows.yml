name: Build Windows Application

on:
  push:
    branches: [ release/windows ]

jobs:
  build:
    # Build cho Windows bắt buộc phải chạy trên runner Windows
    runs-on: windows-latest
    
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 'any'

      - name: Install dependencies
        run: flutter pub get

      - name: Build Windows Application
        # Build bản release (.exe) cho Windows
        run: flutter build windows --release

      - name: Archive Windows Release
        # Nén toàn bộ thư mục bundle thành file .zip để tải về dễ dàng
        uses: actions/upload-artifact@v4
        with:
          name: windows-release-bundle
          path: build/windows/x64/release/bundle/
